<html>

<head>

    <title>My Orders</title>
    <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    #orders{
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 350px));
        justify-content: center;
        gap: 20px;
    }
    .orderCard{
      width: 100%;
        background:#fff;
        border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
     border-left: 4px solid #4CAF50;
     
    }
    

    .orderCard h3{
        margin-top: 0;
        font-size: 16px;
        font-weight: 600;
        color: #1b5e20;
    margin-bottom: 12px;
    }
    .orderCard p {
    font-size: 13px;
    color: #555;
    margin-bottom: 10px;
}
.payBtn {
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
    margin-top: 10px;
    margin-right: 10px;
    transition: background 0.2s;
}
.payBtn:hover {
    background: #388e3c;
}
.cancelBtn {
    background-color: #e53935;
   
    
    padding: 9px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    margin-top: 10px;
    transition: all 0.2s;
}
.cancelBtn:hover {
      background-color: #e00b07;
    color: white;
}
/* Back Button */
.backBtn {
    background: transparent;
    border: 1.5px solid #4CAF50;
    color: #4CAF50;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
}

.backBtn:hover {
    background: #4CAF50;
    color: #fff;
}

/* Invoice Link */
.invoiceLink {
    display: inline-block;
    margin-top: 10px;
    color: #4CAF50;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    border-bottom: 1px dashed #4CAF50;
    transition: color 0.2s;
}

.invoiceLink:hover {
    color: #2e7d32;
}
.cancelled {
    color: #e53935;
    font-weight: 600;
}

  </style>
  <link rel="stylesheet" href="/style.css">
</head>


<body>


    <header>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <!-- 🔥 Nav Links -->
        <nav id="navLinks">
            <a href="/">Home</a>
            <a href="/cart">Cart</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
        <span id="welcome" style="float:right"></span>


    </header>


    <div id="container">

        <h2>📦 My Orders</h2>

        <button class="btn backBtn" onclick="goHome()">
            Back to Home
        </button>
        <br>
        <br>
        <hr>
        <br>
        <br>
        <div id="orders"></div>

    </div>
<footer>
        <div class="footer-container">

            <div class="footer-section">
                <h3>🛒 Grocery Store</h3>
                <p>Fresh groceries delivered at your doorstep</p>
            </div>

            <div class="footer-section">
                <h4>Quick Links</h4>
                <div class="fa">
                    <a href="/">Home</a><br>
                    <a href="/cart">Cart</a><br>
                    <a href="/orders">Orders</a>
                </div>
            </div>

            <div class="footer-section">
                <h4>Categories</h4>
                <p>Fruits</p>
                <p>Vegetables</p>
                <p>Dairy</p>
                <p>Snacks</p>
            </div>

            <div class="footer-section">
                <h4>Contact</h4>
                <p>Email: support@grocery.com</p>
                <p>Phone: +91 9876543210</p>
            </div>

        </div>

        <p class="footer-bottom">© 2026 Grocery Store | All Rights Reserved</p>
    </footer>


    <script>
      function toggleMenu() {
            const nav = document.getElementById("navLinks");
            nav.classList.toggle("active");
        }
        const name = localStorage.getItem("username");

        if (name) {

            welcome.innerHTML = "👋 " + name;

        }

        const token = localStorage.getItem("token");

        if (!token) {

            alert("Login first");
            window.location = "/login";

        }


        // ================= LOAD ORDERS =================

        fetch('/api/orders/my', {

            headers: {
                'Authorization': 'Bearer ' + token
            }

        })
            .then(res => res.json())
            .then(orders => {

                const ordersDiv = document.getElementById("orders");

                if (orders.length == 0) {

                    ordersDiv.innerHTML = "<p>No orders found</p>";
                    return;

                }

                orders.forEach(order => {

                    let paymentSection = "";

                    if (order.paymentStatus === "PENDING"
                        && order.orderStatus === "PLACED") {

                        paymentSection = `

                <button class="btn payBtn"
                 onclick="payNow(${order.id})">
                 Pay Now
                </button>

                <button class="btn cancelBtn"
                 onclick="cancelNow(${order.id})">
                 Cancel
                </button>

            `;

                    }

                    else if (order.orderStatus === "CANCELLED") {

                        paymentSection =
                            `<span class="cancelled">
                CANCELLED
             </span>`;

                    }

                    else {

                        paymentSection = `

                <span style="color:green">
                    Paid ✅
                </span>

                <br>
                 <br>

                <a class="invoiceLink" href="/invoice?orderid=${order.id}">
                View Invoice
                </a>

            `;

                    }


                    const div = document.createElement("div");

                    div.className = "orderCard";

                    div.innerHTML = `

            <h3>Order #${order.id}</h3>

            <p>Status: ${order.orderStatus}</p>

            <p>Payment: ${order.paymentStatus}</p>

            <p>Total: ₹${order.totalAmount}</p>

            <p>Date:
            ${order.orderDate || order.createdAt}
            </p>

            ${paymentSection}

        `;

                    ordersDiv.appendChild(div);

                });

            });


        // ================= CANCEL =================

        function cancelNow(orderId) {

            if (!confirm("Cancel order " + orderId + " ?"))
                return;

            fetch('/api/orders/' + orderId + '/cancel', {

                method: "PUT",

                headers: {
                    'Authorization': 'Bearer ' + token
                }

            })
                .then(() => location.reload());

        }



        // ================= PAY =================

        function payNow(orderId) {

            if (!confirm("Pay order " + orderId + " ?"))
                return;

            fetch('/api/orders/' + orderId + '/pay', {

                method: "PUT",

                headers: {
                    'Authorization': 'Bearer ' + token
                }

            })
                .then(() => location.reload());

        }



        function goHome() {

            window.location = "/";

        }
        function logout() {

            localStorage.clear();
            sessionStorage.clear();

            alert("Logged out");
            window.location = "/login";
        }

    </script>


</body>

</html>
