    <html>

    <head>
        <title>Admin Chat</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: Arial;
                background: #f0f0f0;
            }

            .chat-container {
                display: flex;
                flex-direction: column;
                height: 100%;
                min-height: 0;
            }

            .chat-header {
                background: #4CAF50;
                color: white;
                padding: 12px;
                display: flex;
                justify-content: space-between;
            }

            /* MAIN LAYOUT */
            .chat-body {
                display: flex;
                flex: 1;
                min-height: 0;   
            }

            /* LEFT USER LIST */
            #userList {
                width: 30%;
                background: white;
                border-right: 1px solid #ddd;
                overflow-y: auto;
            }

            #userList h4 {
                padding: 12px;
                background: #f5f5f5;
                border-bottom: 1px solid #ddd;
                font-size: 13px;
                color: #666;
            }


            .userBtn {
                padding: 12px;
                border: none;
                width: 100%;
                text-align: left;
                background: white;
                cursor: pointer;
                border-bottom: 1px solid #eee;
                font-size: 14px;
            }

            .userBtn:hover {
                background: #f5f5f5;
            }

            .activeUser {
                background: #e0f2f1;
            }

            /* RIGHT CHAT */
            .chat-right {
                width: 70%;
                display: flex;
                flex-direction: column;
                 min-height: 0; 
            }

            #chatMessages {
                flex: 1;
                padding: 10px;
                overflow-y: auto;
                background: #e5ddd5;
                display: flex;
                /* ✅ MUST */
                flex-direction: column;
                /* ✅ MUST */
                gap: 6px;
                 min-height: 0; 
            }

            .msg-user {
                align-self: flex-end;
                background: #dcf8c6;
                color: black;
                /* WhatsApp green */
                padding: 8px 12px;
                border-radius: 12px 12px 12px 0;
                max-width: 80%;
                font-size: 12px;
                border: 1px solid #ddd;
                word-wrap: break-word;
            }

            .msg-admin {
                align-self: flex-start;
                background: #ffffff;
                color: black;
                padding: 8px 12px;
                border-radius: 12px 12px 12px 0;
                margin: 5px;
                font-size: 12px;
                max-width: 80%;
            }

            .msg-time {
                font-size: 10px;
                color: gray;
                text-align: right;
            }

            /* INPUT */
            .chat-input {
                display: flex;
                padding: 10px;
                background: white;
                border-top: 1px solid #ddd;
                gap: 8px;
            }

            .chat-input input {
                flex: 1;
                padding: 10px;
                border-radius: 20px;
                border: 1px solid #ccc;
                outline: none;
            }

            .chat-input input:focus {
                border-color: #4CAF50;
            }

            .chat-input button {
                margin-left: 10px;
                padding: 10px 15px;
                background: #4CAF50;
                border: none;
                color: white;
                border-radius: 20px;
                cursor: pointer;
            }

            .no-msg {
                text-align: center;
                margin-top: 50px;
                color: gray;
                align-self: center;
            }

            .select-user-msg {
                text-align: center;
                margin-top: 80px;
                color: #aaa;
                font-size: 15px;
                align-self: center;
            }
        </style>
    </head>

    <body>

        
<div class="chat-container">

    <div class="chat-header">
        💬 Chat
        <button onclick="closeChat()">❌</button>
    </div>

    <div class="chat-body">

        <!-- USERS (ADMIN ONLY) -->
        <div id="userList"></div>

        <!-- CHAT -->
        <div class="chat-right">

            <div id="chatMessages"></div>

            <div class="chat-input">
                <input type="text" id="msgInput"
                       placeholder="Select a user to chat..."
                       onkeypress="if(event.key==='Enter') sendMsg()" />
                <button onclick="sendMsg()">Send</button>
            </div>

        </div>

    </div>

</div>


    </body>

    </html>
