

<html>

<head>
<title>Reset Password</title>


<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#2e7d32;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header a{
color:white;
text-decoration:none;
font-weight:bold;
margin-right:10px;
}

header a:hover{
text-decoration: underline;
opacity: 0.9;
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}

.card{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 8px rgba(0,0,0,0.2);
width:320px;
}

h2{
text-align:center;
color:#2e7d32;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
background:#2e7d32;
color:white;
border:none;
cursor:pointer;
}

.msg{
color:red;
font-weight:bold;
text-align:center;
}

.success{
color:green;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<header>
<div>
<a href="/">Home</a>
</div>
<div>
<a href="/login">Login</a>
</div>
</header>

<div class="container">

<div class="card">

<h2>Reset Password</h2>

<form id="resetform" method="post">
    <input type="hidden" id="token">
    New Password: <input type="password" name="newPassword" required /> <br> <br>
    <button type="submit">Reset Password</button>

</form>

<p class="msg" id="errorMsg"></p>
<p class="success" id="successMsg"></p>

</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

document.getElementById("token").value = token;

document.getElementById("resetform").onsubmit = function(e){

    e.preventDefault();

    const token = document.getElementById("token").value;
    const newPassword = document.querySelector('input[name="newPassword"]').value;

    if(!token){
        document.getElementById("errorMsg").innerText = "Invalid or missing token!";
        return;
    }

    fetch("/api/users/reset-password", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            token: token,
            newPassword: newPassword
        })
    })
    .then(res=>{
        if(!res.ok){
            return res.text().then(m=>{throw new Error(m)});
        }
        return res.text();
    })
    .then(msg=>{
        document.getElementById("successMsg").innerText = msg || "Password updated!";
        document.getElementById("errorMsg").innerText = "";

        setTimeout(() => {
            window.location.href = "/login";
        }, 2000);
    })
    .catch(err=>{
        document.getElementById("errorMsg").innerText = err.message;
        document.getElementById("successMsg").innerText = "";
    });
};
</script>

</body>
</html>
