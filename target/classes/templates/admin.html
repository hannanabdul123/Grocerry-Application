<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>

  <style>

    /* Basic reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      color: #333;
    }

    /* ---- HEADER ---- */
    header {
      background-color: #2e7d32; /* same green as your h3 color */
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      flex-wrap: wrap; /* wraps on small screens */
      gap: 10px;
    }

    header h1 {
      font-size: 1.2rem;
      margin-right: auto;
    }

    /* Search input */
    #searchInput {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      width: 200px;
      display: none; /* shown only for admin via JS */
    }

    /* Welcome text */
    #welcome {
      font-size: 0.9rem;
      color: #c8e6c9;
    }

    /* Nav links */
    nav a {
      color: white;
      text-decoration: none;
      margin-left: 10px;
      font-size: 0.9rem;
      padding: 6px 12px;
      border-radius: 6px;
      background-color: #1b5e20;
    }

   

    /* ---- CONTAINER (same as your original) ---- */
    .usercontainer {
      width: 90%;
      max-width: 1200px;
      margin: 20px auto;
    }

    /* Heading - same green color as your original */
    .usercontainer h3 {
      margin-bottom: 20px;
      color: #2e7d32;
    }

    /* ---- USERS GRID ----
       FIXED: changed auto-fit 250px to auto-fill minmax(250px, 1fr)
       This makes cards stretch and fill the row properly on all screen sizes
    */
    .users {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      align-items: start;
    }

    /* ---- USER CARD (same as your original) ---- */
    .user-card {
      width: 100%;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      line-height: 1.6;
      min-height: 220px;
      transition: transform 0.2s;
    }

    .user-card:hover {
      transform: translateY(-5px);
    }

    .user-card b {
      color: #333;
    }

    /* ---- BUTTONS (same as your original) ---- */
    .user-card button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      transition: transform 0.2s;
    }

    /* Activate - same green */
    .activate { background: #4caf50; }
    .activate:hover { background: #2e7d32; transform: scale(1.05); }

    /* Deactivate - same orange */
    .deactivate { background: #ff9800; }
    .deactivate:hover { background: #e65100; transform: scale(1.05); }

    /* View - same blue */
    .view { background: #1976d2; }
    .view:hover { background: #0d47a1; transform: scale(1.05); }

    /* Delete - same red */
    .delete { background: #d32f2f; }
    .delete:hover { background: #9a0007; transform: scale(1.05); }

    /* ---- RESPONSIVE: mobile screens ----
       Jab screen 500px se choti ho tab header upar neeche ho jata hai
    */
    @media (max-width: 500px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      #searchInput {
        width: 100%;
      }

      nav {
        width: 100%;
        display: flex;
        gap: 8px;
      }

      nav a {
        margin-left: 0;
      }
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>🛠 Admin Dashboard</h1>
    <input type="text" id="searchInput" placeholder="Search Users..." onkeyup="searchUsers()"/>
    <span id="welcome"></span>
    <nav id="navLinks">
      <a href="/">Home</a>
      <a href="#" onclick="logout()">Logout</a>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <div class="usercontainer">
    <h3>All Users</h3>
    <div id="users" class="users"></div>
  </div>


  <script>

    // Show welcome name from localStorage
    const name = localStorage.getItem("username");
    if (name) {
      document.getElementById("welcome").innerHTML = "👋 " + name;
    }

    // Show search box only for admin
    const role = localStorage.getItem("role");
    if (role == "ADMIN") {
      document.getElementById("searchInput").style.display = "block";
    }

    // Logout
    function logout() {
      localStorage.clear();
      alert("Logged out");
      window.location = "/login";
    }

    // Load users on page open
    function init() {
      const token = localStorage.getItem("token");

      if (!token) {
        alert("Login first");
        window.location = "/login";
        return;
      }

      fetch('/api/admin/users', {
        headers: {
          'Authorization': 'Bearer ' + token
        }
      })
      .then(function(res) {
        if (!res.ok) throw new Error();
        return res.json();
      })
      .then(function(users) {
        const div = document.getElementById("users");

        if (users.length == 0) {
          div.innerHTML = "No users";
          return;
        }

        users.forEach(function(u) {
          if (u.role == "ADMIN") return; // skip admin users

          const card = document.createElement("div");
          card.className = "user-card";

          // Show activate or deactivate button based on status
          const btn = u.active
            ? `<button class="deactivate" onclick="deactivateUser(${u.userId})">Deactivate</button>`
            : `<button class="activate"   onclick="activateUser(${u.userId})">Activate</button>`;

          card.innerHTML = `
            <b>ID:</b> ${u.userId} <br>
            <b class="username">Name:</b> ${u.name} <br>
            <b class="useremail">Email:</b> ${u.userEmail} <br>
            <b>Status:</b> ${u.active} <br>
            ${btn}
            <br>
            <button class="view"   onclick="viewUser(${u.userId})">View Details</button>
            <br><br>
            <button class="delete" onclick="deleteUser(${u.userId})">Delete</button>
          `;

          div.appendChild(card);
        });
      });
    }

    // View user detail page
    function viewUser(id) {
      window.location = "/admin-user?userId=" + id;
    }

    // Deactivate user
    function deactivateUser(id) {
      const token = localStorage.getItem("token");
      fetch(`/api/admin/users/${id}/deactivate`, {
        method: "PUT",
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(function() {
        location.reload();
      });
    }

    // Activate user
    function activateUser(id) {
      const token = localStorage.getItem("token");
      fetch(`/api/admin/users/${id}/activate`, {
        method: "PUT",
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(function() {
        location.reload();
      });
    }

    // Delete user
    function deleteUser(id) {
      if (!confirm("Delete user?")) return;

      const token = localStorage.getItem("token");
      fetch(`/api/admin/users/${id}`, {
        method: "DELETE",
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(function() {
        location.reload();
      });
    }

    // Search users by name or email
    function searchUsers() {
      const query = searchInput.value.toLowerCase();
      const cards = document.querySelectorAll(".user-card");

      cards.forEach(function(card) {
        const name  = card.querySelector(".username").nextSibling.textContent.toLowerCase();
        const email = card.querySelector(".useremail").nextSibling.textContent.toLowerCase();

        if (name.includes(query) || email.includes(query)) {
          card.style.display = "";   // show
        } else {
          card.style.display = "none"; // hide
        }
      });
    }

    init();

  </script>

</body>
</html>
